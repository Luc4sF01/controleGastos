<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • Controle de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center font-sans">

<div class="w-full max-w-sm p-8 flex flex-col gap-6">

<h1 class="text-2xl font-semibold text-center">
Controle de Gastos
</h1>

<form id="loginForm" class="flex flex-col gap-4">

<input
id="email"
type="email"
placeholder="Email"
required
class="bg-black border border-white/20 rounded-xl p-3 outline-none focus:border-white"
/>

<input
id="senha"
type="password"
placeholder="Senha"
required
class="bg-black border border-white/20 rounded-xl p-3 outline-none focus:border-white"
/>

<button
type="submit"
class="bg-white text-black p-3 rounded-xl font-medium hover:opacity-80 transition"
>
Entrar
</button>

</form>

<a
href="./cadastro.html"
class="text-sm text-center text-white/60 hover:text-white transition"
>
Criar conta
</a>

</div>

<script type="module">

import { supabase } from "./supabase.js"

const form = document.getElementById("loginForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const email = document.getElementById("email").value
const senha = document.getElementById("senha").value

const { error } = await supabase.auth.signInWithPassword({
email: email,
password: senha
})

if(error){
alert(error.message)
return
}

window.location.href = "./dashboard.html"

})

</script>

</body>
</html>
