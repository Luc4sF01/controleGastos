<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro • Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
        }

        .dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-position: center;
            background-size: cover;
            z-index: -2;
            transition: opacity 1s ease;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 2.5rem;
            width: 90%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            position: relative;
            z-index: 10;
        }

        .apple-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .btn-prime {
            background: #fff;
            color: #000;
            font-weight: 700;
            letter-spacing: -0.02em;
            transition: all 0.3s ease;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
            background: #f0f0f0;
        }

        .fade-in {
            animation: fadeInScale 0.7s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="dynamic-bg" id="bg"></div>
    <div class="overlay"></div>

    <main class="glass-card fade-in">
        
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-[900] tracking-tighter text-white uppercase italic">
                Pro<span class="text-white/40">Flow</span>
            </h1>
            <p class="text-white/50 text-[10px] tracking-[0.3em] uppercase mt-2">Controle Financeiro</p>
        </header>

        <form id="loginForm" class="space-y-4">
            <input
                id="email"
                type="email"
                placeholder="E-mail"
                required
                class="apple-input w-full rounded-2xl p-4 text-sm"
            />

            <input
                id="senha"
                type="password"
                placeholder="Senha"
                required
                class="apple-input w-full rounded-2xl p-4 text-sm"
            />

            <button
                type="submit"
                class="btn-prime w-full p-4 rounded-2xl mt-4 text-sm uppercase tracking-wider">
                Entrar
            </button>
        </form>

        <footer class="mt-8 flex flex-col gap-3 items-center">
            <a href="./cadastro.html" class="text-xs text-white/40 hover:text-white transition-all font-light">
                Não possui conta? <span class="font-bold text-white/70">Registre-se</span>
            </a>
            
            <div class="h-[1px] w-8 bg-white/10"></div> <a href="./reset.html" class="text-[10px] text-white/30 hover:text-white transition-all uppercase tracking-widest font-medium">
                Esqueci minha senha
            </a>
        </footer>

    </main>

    <script type="module">
        import { supabase } from "./supabase.js"

        const bg = document.getElementById('bg');
        const randomID = Math.floor(Math.random() * 1000);
        bg.style.backgroundImage = `url('https://picsum.photos/id/${randomID}/1920/1080?grayscale&blur=2')`;

        const form = document.getElementById("loginForm")

        form.addEventListener("submit", async (e)=>{
            e.preventDefault()
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "VERIFICANDO...";
            btn.style.opacity = "0.5";

            const email = document.getElementById("email").value
            const senha = document.getElementById("senha").value

            const { error } = await supabase.auth.signInWithPassword({
                email,
                password: senha
            })

            if(error){
                alert("Erro: " + error.message)
                btn.innerText = originalText;
                btn.style.opacity = "1";
                return
            }

            window.location.href="./dashboard.html"
        })
    </script>

</body>
</html>
