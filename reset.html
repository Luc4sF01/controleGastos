<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFlow • Recuperar Senha</title>
<link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
        }

        /* Background Dinâmico Padronizado */
        .dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-position: center;
            background-size: cover;
            z-index: -2;
            transition: opacity 1s ease;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* CARD DE VIDRO BRANCO */
        .glass-card {
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            border-radius: 2.5rem;
            width: 90%;
            max-width: 400px;
            padding: 3.5rem 2.5rem;
            position: relative;
            z-index: 10;
        }

        /* Inputs Estilo Dark Glass */
        .apple-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        /* Botão Branco Minimalista */
        .btn-prime {
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1);
            background: #f8f8f8;
        }

        .fade-in {
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

<body>

    <div class="dynamic-bg" id="bg"></div>
    <div class="overlay"></div>

    <main class="glass-card fade-in">
        
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-[900] tracking-tighter text-white uppercase italic leading-none">
                Reset<span class="text-white/30">.</span>Access
            </h1>
            <p class="text-white/50 text-[10px] tracking-[0.3em] uppercase mt-4">Recuperação de conta</p>
        </header>

        <div class="space-y-4">
            <input
                id="email"
                type="email"
                placeholder="Digite seu e-mail cadastrado"
                required
                class="apple-input w-full rounded-2xl p-5 text-sm"
            />

            <button
                id="reset"
                class="btn-prime w-full p-5 rounded-2xl mt-4 text-sm tracking-wider">
                Enviar Instruções
            </button>
        </div>

        <footer class="mt-10 text-center">
            <a href="./index.html" class="text-[10px] text-white/40 hover:text-white transition-all font-medium uppercase tracking-[0.2em]">
                ← Voltar para o login
            </a>
        </footer>

    </main>

    <script type="module">
        import { supabase } from "./supabase.js"

        // Carrega imagem aleatória P&B
        const bg = document.getElementById('bg');
        const randomID = Math.floor(Math.random() * 800);
        bg.style.backgroundImage = `url('https://picsum.photos/id/${randomID}/1920/1080?grayscale&blur=2')`;

        document.getElementById("reset").onclick = async () => {
            const btn = document.getElementById("reset");
            const email = document.getElementById("email").value;

            if(!email) {
                alert("Por favor, insira um e-mail.");
                return;
            }

            btn.innerText = "ENVIANDO...";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: "https://controle-gastos-kohl.vercel.app/nova-senha.html"
            });

            if(error){
                alert("Erro: " + error.message);
                btn.innerText = "ENVIAR INSTRUÇÕES";
                btn.style.opacity = "1";
                btn.disabled = false;
            } else {
                alert("E-mail de recuperação enviado com sucesso!");
                window.location.href = "./index.html";
            }
        }
    </script>

</body>
</html>
