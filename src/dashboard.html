<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard • Controle de Gastos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans min-h-screen">

<div class="max-w-md mx-auto p-6 flex flex-col gap-8">

<header class="flex justify-between items-center">
<h1 class="text-xl font-semibold">Controle de Gastos</h1>

<button id="logout"
class="text-sm border border-white/20 px-3 py-1 rounded-lg hover:bg-white hover:text-black transition">
Sair
</button>
</header>

<section class="border border-white/10 rounded-xl p-5">
<p class="text-sm text-white/60">Total do mês</p>
<h2 id="total" class="text-3xl font-semibold mt-1">R$ 0</h2>
</section>

<select id="mesFiltro" class="bg-black border border-white/20 p-3 rounded-lg"></select>

<section class="flex flex-col gap-3">

<input id="titulo" placeholder="Título do gasto"
class="bg-black border border-white/20 p-3 rounded-lg">

<input id="valor" type="number" placeholder="Valor"
class="bg-black border border-white/20 p-3 rounded-lg">

<input id="data" type="date"
class="bg-black border border-white/20 p-3 rounded-lg">

<button id="salvar"
class="bg-white text-black p-3 rounded-lg font-medium">
Adicionar gasto
</button>

</section>

<section>
<h3 class="text-sm text-white/60 mb-3">Gastos</h3>

<div id="lista"
class="flex flex-col divide-y divide-white/10 border border-white/10 rounded-lg">
</div>
</section>

</div>

<!-- MODAL EDITAR -->

<div id="modalEditar"
class="fixed inset-0 bg-black/70 hidden items-center justify-center">

<div class="bg-black border border-white/20 rounded-xl p-6 w-80 flex flex-col gap-3">

<h3 class="text-lg font-semibold">Editar gasto</h3>

<input id="editTitulo"
class="bg-black border border-white/20 p-3 rounded-lg">

<input id="editValor" type="number"
class="bg-black border border-white/20 p-3 rounded-lg">

<input id="editData" type="date"
class="bg-black border border-white/20 p-3 rounded-lg">

<div class="flex gap-3 mt-2">

<button id="salvarEdicao"
class="bg-white text-black p-2 rounded-lg flex-1">
Salvar
</button>

<button id="cancelarEdicao"
class="border border-white/20 p-2 rounded-lg flex-1">
Cancelar
</button>

</div>

</div>
</div>

<script type="module">

import { supabase } from "./supabase.js"

const { data } = await supabase.auth.getSession()

if(!data.session){
window.location.href="index.html"
}

const lista = document.getElementById("lista")
const totalEl = document.getElementById("total")
const filtroMes = document.getElementById("mesFiltro")

const modal = document.getElementById("modalEditar")
const editTitulo = document.getElementById("editTitulo")
const editValor = document.getElementById("editValor")
const editData = document.getElementById("editData")

let editId = null

const meses=["01","02","03","04","05","06","07","08","09","10","11","12"]

meses.forEach(m=>{
const opt=document.createElement("option")
opt.value=m
opt.innerText="Mês "+m
filtroMes.appendChild(opt)
})

filtroMes.value=new Date().toISOString().slice(5,7)

document.getElementById("data").value=
new Date().toISOString().split("T")[0]

async function carregarGastos(){

const { data:userData } = await supabase.auth.getUser()

const mes=filtroMes.value

const { data:gastos } = await supabase
.from("gastos")
.select("*")
.eq("user_id",userData.user.id)
.order("data",{ascending:false})

lista.innerHTML=""

let total=0

gastos.forEach(g=>{

const mesGasto=g.data.slice(5,7)
if(mesGasto!==mes) return

total+=Number(g.valor)

lista.innerHTML+=`
<div class="flex flex-col p-4 gap-2">

<div class="flex justify-between">
<span>${g.titulo}</span>
<span>R$ ${g.valor}</span>
</div>

<div class="flex justify-between text-xs text-white/50">

<span>${g.data}</span>

<div class="flex gap-3">

<button class="text-blue-400"
data-edit="${g.id}">
Editar
</button>

<button class="text-red-400"
data-delete="${g.id}">
Excluir
</button>

</div>

</div>

</div>
`
})

totalEl.innerText="R$ "+total

document.querySelectorAll("[data-delete]").forEach(btn=>{
btn.onclick=async ()=>{
const id=btn.dataset.delete

if(!confirm("Deseja excluir este gasto?")) return

await supabase
.from("gastos")
.delete()
.eq("id",id)

carregarGastos()
}
})

document.querySelectorAll("[data-edit]").forEach(btn=>{
btn.onclick=async ()=>{

const id=btn.dataset.edit

const { data:gasto } = await supabase
.from("gastos")
.select("*")
.eq("id",id)
.single()

editId=id
editTitulo.value=gasto.titulo
editValor.value=gasto.valor
editData.value=gasto.data

modal.classList.remove("hidden")
modal.classList.add("flex")

}
})

}

document.getElementById("salvar").onclick=async ()=>{

const titulo=document.getElementById("titulo").value
const valor=document.getElementById("valor").value
const data=document.getElementById("data").value

const { data:userData } = await supabase.auth.getUser()

await supabase
.from("gastos")
.insert([{
titulo,
valor,
data,
user_id:userData.user.id
}])

document.getElementById("titulo").value=""
document.getElementById("valor").value=""

carregarGastos()
}

document.getElementById("salvarEdicao").onclick=async ()=>{

await supabase
.from("gastos")
.update({
titulo:editTitulo.value,
valor:editValor.value,
data:editData.value
})
.eq("id",editId)

modal.classList.add("hidden")

carregarGastos()
}

document.getElementById("cancelarEdicao").onclick=()=>{
modal.classList.add("hidden")
}

document.getElementById("logout").onclick=async ()=>{
await supabase.auth.signOut()
window.location.href="index.html"
}

filtroMes.onchange=carregarGastos

carregarGastos()

</script>

</body>
</html>
