<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFlow • Criar Conta</title>
<link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000;
        }

        /* Background Dinâmico (Sincronizado com o estilo da outra página) */
        .dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-position: center;
            background-size: cover;
            z-index: -2;
            filter: grayscale(100%) brightness(0.8);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* CARD DE VIDRO BRANCO */
        .glass-card {
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            border-radius: 2.5rem;
            width: 90%;
            max-width: 400px;
            padding: 3.5rem 2.5rem;
            position: relative;
            z-index: 10;
        }

        /* Inputs Estilo Dark Glass */
        .apple-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        /* Botão Branco Minimalista */
        .btn-prime {
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1);
            background: #f8f8f8;
        }

        .fade-in {
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>

<body>

    <div class="dynamic-bg" id="bg"></div>
    <div class="overlay"></div>

    <main class="glass-card fade-in">
        
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-900 tracking-tighter text-white italic">
                PRO<span class="text-white/30">.</span>FLOW
            </h1>
            <p class="text-white/50 text-[10px] tracking-[0.4em] uppercase mt-2">Crie Sua Conta gratuitamente</p>
        </header>

        <form id="cadastroForm" class="space-y-4">
            <input
                id="email"
                type="email"
                placeholder="E-mail"
                required
                class="apple-input w-full rounded-2xl p-5 text-sm"
            />

            <input
                id="senha"
                type="password"
                placeholder="Crie uma senha"
                required
                class="apple-input w-full rounded-2xl p-5 text-sm"
            />

            <button
                type="submit"
                class="btn-prime w-full p-5 rounded-2xl mt-4 text-sm">
                Cadastrar agora
            </button>
        </form>

        <footer class="mt-10 text-center">
            <a href="./index.html" class="text-xs text-white/40 hover:text-white transition-all font-light uppercase tracking-widest">
                Já possui conta? <span class="font-bold text-white/80 border-b border-white/20">Entrar</span>
            </a>
        </footer>

    </main>

    <script type="module">
        import { supabase } from "./supabase.js"

        // Carrega uma imagem aleatória de tema dark/arquitetura
        const bg = document.getElementById('bg');
        const randomID = Math.floor(Math.random() * 500);
        bg.style.backgroundImage = `url('https://picsum.photos/id/${randomID}/1920/1080?grayscale')`;

        const form = document.getElementById("cadastroForm")

        form.addEventListener("submit", async (e)=>{
            e.preventDefault()
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "CRIANDO...";
            btn.disabled = true;

            const email = document.getElementById("email").value
            const senha = document.getElementById("senha").value

            const { error } = await supabase.auth.signUp({
                email,
                password: senha
            })

            if(error){
                alert("Erro: " + error.message)
                btn.innerText = originalText;
                btn.disabled = false;
                return
            }

            alert("Conta criada com sucesso!")
            window.location.href="./index.html"
        })
    </script>

</body>
</html>
